name: Android Google Play Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: metadata = store listing only; release = build and upload AAB
        type: choice
        options:
          - metadata
          - release
        default: metadata
      package_name:
        description: Android application ID, for example com.example.game
        type: string
        required: true
      track:
        description: Google Play release track (release mode only)
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      release_status:
        description: Google Play release status
        type: choice
        options:
          - completed
          - draft
          - inProgress
          - halted
        default: completed
      rollout:
        description: Fraction from 0 to 1 when status is inProgress
        type: string
        default: "0.1"
      gradle_task:
        description: Gradle task used to build the signed bundle
        type: string
        default: bundleRelease
      aab_path:
        description: AAB path relative to android-app
        type: string
        default: app/build/outputs/bundle/release/app-release.aab
      upload_metadata:
        description: Upload listing metadata together with the AAB
        type: boolean
        default: true
      validate_only:
        description: Validate with Google Play without committing changes
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: android-play-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android-app
    env:
      PACKAGE_NAME: ${{ inputs.package_name }}
      PLAY_TRACK: ${{ inputs.track }}
      RELEASE_STATUS: ${{ inputs.release_status }}
      ROLLOUT: ${{ inputs.rollout }}
      AAB_PATH: ${{ inputs.aab_path }}
      UPLOAD_METADATA: ${{ inputs.upload_metadata }}
      VALIDATE_ONLY: ${{ inputs.validate_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: android-app

      - name: Prepare Google Play service account
        shell: bash
        env:
          PLAY_STORE_JSON_KEY_BASE64: ${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}
        run: |
          if [ -z "$PLAY_STORE_JSON_KEY_BASE64" ]; then
            echo "::error::PLAY_STORE_JSON_KEY_BASE64 secret is empty."
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/google-play-service-account.json"
          printf '%s' "$PLAY_STORE_JSON_KEY_BASE64" | tr -d '\r\n ' | base64 --decode > "$KEY_PATH"
          if ! grep -q '"type"[[:space:]]*:[[:space:]]*"service_account"' "$KEY_PATH"; then
            echo "::error::Decoded secret is not a Google service-account JSON file."
            exit 1
          fi
          chmod 600 "$KEY_PATH"
          echo "PLAY_STORE_JSON_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Set up Java
        if: ${{ inputs.mode == 'release' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: ${{ inputs.mode == 'release' }}
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Android signing key
        if: ${{ inputs.mode == 'release' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Android signing secrets are incomplete."
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n ' | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed Android App Bundle
        if: ${{ inputs.mode == 'release' }}
        shell: bash
        run: |
          if [ ! -f ./gradlew ]; then
            echo "::error::android-app/gradlew was not found. Add the Android project before using release mode."
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace "${{ inputs.gradle_task }}"

      - name: Upload Google Play metadata
        if: ${{ inputs.mode == 'metadata' }}
        run: bundle exec fastlane android metadata

      - name: Upload AAB to Google Play
        if: ${{ inputs.mode == 'release' }}
        run: bundle exec fastlane android release
