<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141a38">
<title>Color Split — App Store Screenshot Source</title>
<link rel="stylesheet" href="../docs/style.css?v=store">
<style>
  #menuPanel { animation: none !important; transform: translateX(0) !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<button id="menuBtn" aria-label="Menü">
  <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="4" y1="6" x2="20" y2="6"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="18" x2="20" y2="18"></line>
  </svg>
</button>

<div id="menuOverlay" class="hidden" aria-hidden="true">
  <aside id="menuPanel" role="dialog" aria-label="Menü">
    <header id="menuHeader">
      <button id="menuBack" class="icon-btn hidden" aria-label="Geri">‹</button>
      <h2 id="menuTitle">Menü</h2>
      <button id="menuClose" class="icon-btn" aria-label="Kapat">×</button>
    </header>
    <div id="menuBody"></div>
  </aside>
</div>

<script>
  window.COLOR_SPLIT_STORE_SCREENSHOT = true;
  localStorage.setItem('colorsort_v1', JSON.stringify({
    levelIndex: 7,
    coins: 1280,
    solvedCount: 7,
    solvedStates: []
  }));
</script>
<script src="../docs/leaderboard.js?v=store"></script>
<script src="../docs/game.js?v=store"></script>
<script src="../docs/menu.js?v=store"></script>
<script>
  window.addEventListener('load', () => {
    const mode = new URLSearchParams(window.location.search).get('mode') || 'main';
    if (mode === 'menu') document.getElementById('menuBtn').click();
  });
</script>
</body>
</html>
