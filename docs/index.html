<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141a38">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Color Split</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- Hamburger menü butonu (üst sol) -->
<button id="menuBtn" aria-label="Menü">
  <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="4" y1="6" x2="20" y2="6"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="18" x2="20" y2="18"></line>
  </svg>
</button>

<!-- Menü katmanı (soldan açılan çekmece) -->
<div id="menuOverlay" class="hidden" aria-hidden="true">
  <aside id="menuPanel" role="dialog" aria-label="Menü">
    <header id="menuHeader">
      <button id="menuBack" class="icon-btn hidden" aria-label="Geri">‹</button>
      <h2 id="menuTitle">Menü</h2>
      <button id="menuClose" class="icon-btn" aria-label="Kapat">×</button>
    </header>
    <div id="menuBody"></div>
  </aside>
</div>

<script src="leaderboard.js?v=20260715a"></script>
<script src="game.js?v=20260715a"></script>
<script src="menu.js?v=20260715a"></script>
</body>
